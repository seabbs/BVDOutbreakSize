# Observation snapshot as used by the McCabe et al. Imperial College
# London report (20 May 2026 update, DOI 10.25560/13005307). This
# update revised the DRC deaths used (88 -> 131) and corrected the
# CFR scenario bounds. The points-of-entry/travel inputs are still the
# 16 May 2026 snapshot, while the DRC deaths/cases are as of 20 May
# 2026. The exported-case death and detection timing (14 and 11 May,
# which the report does not model) are included from the WHO data
# available by the cut-off, since our joint model conditions on them.
# Fitting our joint model to this snapshot isolates the effect of our
# method from the effect of newer data. Update this file if McCabe
# et al. release a further revised report.

as_of_date = "2026-05-20"

[exported_cases]
value  = 2
source = "McCabe et al. 20 May 2026 update — 2 cases confirmed in Kampala among Ituri travellers"

[exports_deaths]
value  = 1
source = "One death among the two Uganda exports (WHO DON 2026-DON602, died 14 May 2026, before the 20 May cut-off). The report does not model exported-case deaths; our joint model conditions on it."

[first_export_detection_date]
value  = "2026-05-11"
source = "WHO DON 2026-DON602 — first Uganda export hospital-admitted 11 May 2026 (detection date). One-sided timing bound on T."

[export_death_dates]
value  = ["2026-05-14"]
source = "WHO DON 2026-DON602 — the fatal Uganda export died 14 May 2026 (before the 20 May cut-off). Loaded as a daily series bounding T; the report does not use it."

[total_deaths]
value  = 131
source = "McCabe et al. 20 May 2026 update — 131 suspected deaths in DRC as of 20 May 2026"

[reported_cases]
value  = 516
source = "McCabe et al. 20 May 2026 update — 516 suspected cases in DRC as of 20 May 2026"

# Cumulative reported-case totals across the report vintages. The model
# fits the between-vintage increment (336 -> 516) rather than the nested
# cumulative totals, trusting the cumulative-at-date counts but not the
# per-case timing. The cut-off vintage (20 May) matches `reported_cases`.
[reported_case_history]
dates  = ["2026-05-16", "2026-05-20"]
values = [336, 516]
source = "336 as of 16 May 2026 from the McCabe et al. report (DOI 10.25560/130007); 516 as of 20 May 2026 from the McCabe et al. 20 May 2026 update (DOI 10.25560/13005307). DRC suspected cases."

[daily_outbound_travellers]
value  = 1871
source = "McCabe et al. Table 3 — mean daily PoE flow, Ituri side (16 May 2026 snapshot)"

[daily_outbound_travellers_sd]
value  = 200
source = "PoE-to-PoE variation and sitrep sampling uncertainty; ~10% CV"

[source_population]
value  = 4392200
source = "McCabe et al. Table 1 — Ituri Province population"
