# Observation snapshot as used by the McCabe et al. Imperial College
# London report (18 May 2026, DOI 10.25560/130007). Counts are the
# report's input data as of its cut-off (16 May 2026; the exported-case
# count is as of 17 May). The exported-case death and detection timing
# (14 and 11 May, which the report does not model) are included from
# the WHO data available by the cut-off, since our joint model
# conditions on them. Fitting our joint model to this snapshot isolates
# the effect of our method from the effect of newer data. Update this
# file if McCabe et al. release a revised report.

as_of_date = "2026-05-16"

[exported_cases]
value  = 2
source = "McCabe et al. report — 2 cases confirmed in Kampala among Ituri travellers (as of 17 May 2026)"

[exports_deaths]
value  = 1
source = "One death among the two Uganda exports (WHO DON 2026-DON602, died 14 May 2026, before the 16 May cut-off). The report does not model exported-case deaths; our joint model conditions on it."

[first_export_detection_date]
value  = "2026-05-11"
source = "WHO DON 2026-DON602 — first Uganda export hospital-admitted 11 May 2026 (detection date). One-sided timing bound on T."

[export_death_dates]
value  = ["2026-05-14"]
source = "WHO DON 2026-DON602 — the fatal Uganda export died 14 May 2026 (before the 16 May cut-off). Loaded as a daily series bounding T; the report does not use it."

[total_deaths]
value  = 88
source = "McCabe et al. report — 88 suspected deaths in DRC as of 16 May 2026"

[reported_cases]
value  = 336
source = "McCabe et al. report — 336 suspected cases in DRC as of 16 May 2026"

[daily_outbound_travellers]
