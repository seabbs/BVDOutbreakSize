# Observation snapshot as used by the McCabe et al. Imperial College
# London report (18 May 2026, DOI 10.25560/130007). Counts are the
# report's input data as of its cut-off (16 May 2026; the exported-case
# count is as of 17 May). Fitting our joint model to this snapshot
# isolates the effect of our method from the effect of newer data: it
# uses our priors and joint likelihood but the report's data. Update
# this file if McCabe et al. release a revised report.

as_of_date = "2026-05-16"

