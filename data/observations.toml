# Observations for the 2026 DRC Bundibugyo virus disease outbreak.
# Each entry pairs a numeric value with a short source citation;
# both are loaded by `load_observations` and printed in the
# walkthrough.
#
# DRC counts (reported_cases, total_deaths, reported_case_history) are
# sourced from the INRB-UMIE/Ebola_DRC_2026 transcription of the INSP
# (DRC Institut National de Santé Publique) situation reports for the
# 17th Ebola epidemic (https://insp.cd/ebola-17eme-epidemie/), summed
# across reporting health zones at each sitrep date.
# Source: https://github.com/INRB-UMIE/Ebola_DRC_2026 (MIT licence;
# manually transcribed from INSP PDFs). The 26 May 2026 cut-off is the
# latest INSP sitrep with full zone coverage and no aggregate
# down-revision. Two intermediate or later vintages are skipped: the
# 24 May vintage revises two zones downward (Goma and Katwa), giving a
# cases sum (893) below 23 May; the 27 May vintage drops to 13-16
# reporting zones (from 19-20 on 26 May) with many zones revised
# sharply downward (Bunia 279->249, Mongbalu 375->339, Nyankunde
# 70->45), an incomplete backfill that understates the cumulative.
#
# Zone coverage grows over the trajectory: 7 zones reporting on 18 May,
# 12 by 23 May, 19-20 by 26 May. So a higher cumulative at a later
# sitrep may partly reflect newly-reporting zones rather than incidence
# alone. The 18 May INSP sum (516 cases, 131 deaths) matches the WHO
# AFRO joint sitrep 01 figure exactly. The model uses suspected counts.

as_of_date = "2026-05-26"

[exported_cases]
value  = 3
source = "WHO DON 2026-DON602, 2026-DON603, and WHO Director-General Ministerial Briefing 25 May 2026 — three travel-related (DRC) cases imported into Uganda: (i) elderly man admitted Kampala 11 May 2026, died 14 May; (ii) second import confirmed 16 May 2026 in Kampala with no apparent link to the first; (iii) woman from DRC who travelled Arua to Entebbe to Kampala with mild symptoms, tested positive on follow-up, announced 23 May 2026 (https://www.aljazeera.com/news/2026/5/23/uganda-confirms-three-new-ebola-cases-bringing-total-to-five). Two additional Uganda confirmed cases announced 23 May (a driver and a healthcare worker) are domestic contacts of import #1 and are excluded — this model treats Uganda as imports only."

[exports_deaths]
value  = 1
source = "WHO DON 2026-DON602 — one death (import #1, died 14 May 2026). No deaths reported among imports #2 or #3 as of the 23 May 2026 cut-off."

[first_export_detection_date]
value  = "2026-05-11"
source = "WHO DON 2026-DON602 — import #1 hospital-admitted 11 May 2026 (point-of-entry/hospital detection date). Used as a one-sided timing bound on T. Detection dates for imports #2 (confirmed 16 May) and #3 (announced 23 May; underlying detection date not published) are not used by the model: only the earliest detection enters the timing term."

[export_death_dates]
value  = ["2026-05-14"]
source = "WHO DON 2026-DON602 — the fatal Uganda export (import #1) was hospital-admitted 11 May 2026 and died 14 May 2026 (hospital-recorded death date). A list of dated export deaths; loaded as a daily series and fitted with a binned-Poisson likelihood that bounds T."

[total_deaths]
value  = 246
source = "INRB-UMIE/Ebola_DRC_2026 transcription of the INSP situation report for 26 May 2026 — DRC cumulative suspected deaths, summed across the 20 reporting health zones from insp_sitrep__cumulative_suspected_deaths__daily.csv (ND zone entries dropped). The 27 May vintage is held back: it drops to 16 reporting zones, giving a lower sum (238)."

[reported_cases]
value  = 1064
source = "INRB-UMIE/Ebola_DRC_2026 transcription of the INSP situation report for 26 May 2026 — DRC cumulative suspected cases, summed across the 19 reporting health zones from insp_sitrep__cumulative_suspected_cases__daily.csv. The 27 May vintage is held back: it drops to 13 reporting zones with several revised downward, giving a lower sum (906)."

# Cumulative reported-case totals across INSP situation-report vintages.
# We trust each vintage's cumulative-at-date count but not the per-case
# timing (heavy backfill at the zone level; the INSP `date` is the
# sitrep publication date, not symptom onset or specimen collection),
# so the model fits the between-vintage increments rather than the
# nested cumulative totals. Values are cumulative DRC suspected cases
# summed across reporting health zones at each INSP sitrep date. The
# cut-off vintage (26 May) matches `reported_cases`. The 14 and 15 May
# vintages from INSP cover only 1 and 3 zones respectively and are
# omitted here; we start the trajectory at 18 May (7 zones, matching
# the WHO joint sitrep 01 total of 516) and grow to 19 zones by 26 May.
# The 24 May vintage (down-revision) and the 27 May vintage (incomplete
# zone coverage) are omitted; see the header comment.
[reported_case_history]
dates  = ["2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21",
          "2026-05-22", "2026-05-23", "2026-05-25", "2026-05-26"]
values = [516, 575, 672, 745, 872, 905, 998, 1064]
source = "INRB-UMIE/Ebola_DRC_2026 (https://github.com/INRB-UMIE/Ebola_DRC_2026, MIT licence), transcribed from INSP situation reports published 18-26 May 2026. Values are cumulative DRC suspected cases summed across reporting health zones at each sitrep date. The 24 May vintage is omitted because two zones (Goma, Katwa) were revised downward, giving a cumulative sum (893) below 23 May; the 27 May vintage is omitted because reporting zones fell to 13, giving a sum (906) below 26 May."

[confirmed_cases]
value  = 121
source = "INSP SitRep 012 (data as of 26 May 2026) section IV.3 LABORATOIRE — `Cumul positifs`, read from the situation-report PDF. The lab-section headline figure is ten higher than the INRB-UMIE zone-summed transcription (111) because some confirmed samples are not yet linked to a reporting zone (`échantillons sans fiche`); we use the lab raw count to stay consistent with [cumulative_tests_analysed] below, which is also from the lab section. This scalar pairs with the testing volume for the per-test positivity; the per-vintage confirmed stream the joint model fits comes from [confirmed_case_history] (zone-summed)."

[cumulative_tests_analysed]
value  = 403
source = "INSP SitRep 012 (data as of 26 May 2026) section IV.3 LABORATOIRE — `Cumul échantillons analysés`, read from the situation-report PDF. Cumulative number of suspected-case specimens that the Bunia/INRB pipeline has completed processing by the cut-off. Of 662 specimens received, 403 have been analysed, leaving a 259-specimen backlog; this gives a natural right-truncation handle on the per-test positivity rate (121/403 ≈ 30%). Testing in Ituri stalled mid-period (SitRep 011, 25 May: `Aucun échantillon n'a été analysé en Ituri`)."

# Cumulative confirmed-case totals across INSP situation-report vintages.
# Same caveats as `reported_case_history`: we trust each vintage's
# cumulative-at-date but not per-case timing, so the daily likelihood
# fits the between-vintage increments. Dates match the suspected
# history so the two streams share day boundaries (and the bin-edge
# diff for the daily likelihood is well defined). The 24 May and 27 May
# vintages are omitted to share dates with the suspected history (see
# the header comment for the down-revision and zone-coverage reasons).
[confirmed_case_history]
dates  = ["2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21",
          "2026-05-22", "2026-05-23", "2026-05-25", "2026-05-26"]
values = [33, 51, 57, 79, 83, 95, 100, 111]
source = "INRB-UMIE/Ebola_DRC_2026 (https://github.com/INRB-UMIE/Ebola_DRC_2026, MIT licence), transcribed from INSP situation reports published 18-26 May 2026. Values are cumulative DRC laboratory-confirmed cases summed across reporting health zones at each sitrep date. Dates match the suspected history; the 24 and 27 May vintages are omitted for the reasons given there."

# Cumulative suspected-death totals across INSP situation-report
# vintages. Same caveats as `reported_case_history`: we trust each
# vintage's cumulative-at-date but not the per-death timing, so the
# daily likelihood fits the between-vintage increments. Dates match the
# suspected case history so the streams share day boundaries. The 18 May
# sum (131 deaths) matches the WHO AFRO joint sitrep 01 figure and the
# 26 May cut-off (246) matches `total_deaths`. One zone (Kilo) revises
# its 24 May death count down to zero on 25 May, but the aggregate stays
# monotone across the kept vintages.
# Note: the 23 May INSP sitrep (009) headline dashboard prints 119
# cumulative suspected deaths, but that is a data-entry slip — the
# per-zone rows in Tableau IV of the same report sum to 220, which is
# the value used here (and what the zone-summed CSV gives). We use the
# auditable zone sum throughout rather than the headline totals, which
# carry occasional transcription errors like this one.
[death_history]
dates  = ["2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21",
          "2026-05-22", "2026-05-23", "2026-05-25", "2026-05-26"]
values = [131, 148, 160, 175, 204, 220, 238, 246]
source = "INRB-UMIE/Ebola_DRC_2026 (https://github.com/INRB-UMIE/Ebola_DRC_2026, MIT licence), transcribed from INSP situation reports published 18-26 May 2026. Values are cumulative DRC suspected deaths summed across reporting health zones at each sitrep date, from insp_sitrep__cumulative_suspected_deaths__daily.csv (ND zone entries dropped). Dates match the suspected case history; the 24 and 27 May vintages are omitted for the reasons given there."

[daily_outbound_travellers]
value  = 1871
source = "McCabe et al. Table 3 — mean daily PoE flow across seven Uganda-DRC border points, Ituri side"

[daily_outbound_travellers_sd]
value  = 200
source = "PoE-to-PoE variation and sitrep sampling uncertainty; ~10% CV"

[source_population]
value  = 4392200
source = "McCabe et al. Table 1 — Ituri Province population"

# Genetic TMRCA. A soft lower bound on the seeding time T, the time to
# the most recent common ancestor of the first sequenced cases. It is a
# lower bound because adding sequences only pushes the TMRCA older, and
# the sampled tree is geographically narrow (9 of 10 genomes from
# Bunia), so broader sampling could move it earlier. `date` is the
# BEAST mean TMRCA reported in the 2026-05-21 temporal-tree update.
# `days_sd` is the SD on the location of the floor (uncertainty in the
# estimate, in either direction), not a constraint on how old T can be;
# it is derived from the reported 95% HPD interval (about +/- 30 days,
# so SD ~ 15 days). `alt_date` / `alt_days_sd` carry the same estimate
# under the faster 1.9e-3 early-epidemic clock rate (mean 2026-04-11,
# 95% HPD 2026-03-23 to 2026-04-28, so SD ~ 9 days), used by the
# clock-rate sensitivity. Both dates are converted to days before
# `as_of_date` at load time, so they track changes to the cut-off.
[genetic_tmrca]
date        = "2026-03-25"
days_sd     = 15
alt_date    = "2026-04-11"
alt_days_sd = 9
source = "BEAST v10.5.0 temporal tree of the first 10 BDBV genomes (virological2026, 2026-05-21 update; HKY substitution model, strict molecular clock, exponential coalescent prior). Mean TMRCA 2026-03-25, 95% HPD 2026-02-20 to 2026-04-20, at the 1.2e-3 substitutions/site/year clock rate (holmes2016, all public 2013-2016 EBOV data) matching this analysis. The faster 1.9e-3 early-epidemic rate gives a more recent mean TMRCA of 2026-04-11 (HPD 2026-03-23 to 2026-04-28). Estimate is Bunia-specific and a lower bound, since further or geographically broader sequencing only pushes the TMRCA older. Using the genetic TMRCA as a seeding bound follows a suggestion of N. Ferguson (ferguson2026)."
