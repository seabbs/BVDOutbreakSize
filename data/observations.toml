# Observations for the 2026 DRC Bundibugyo virus disease outbreak.
# Each entry pairs a numeric value with a short source citation;
# both are loaded by `load_observations` and printed in the
# walkthrough.
#
# DRC counts (reported_cases, total_deaths, reported_case_history) are
# sourced from the INRB-UMIE/Ebola_DRC_2026 transcription of the INSP
# (DRC Institut National de Santé Publique) situation reports for the
# 17th Ebola epidemic (https://insp.cd/ebola-17eme-epidemie/), summed
# across reporting health zones at each sitrep date.
# Source: https://github.com/INRB-UMIE/Ebola_DRC_2026 (MIT licence;
# manually transcribed from INSP PDFs). The 23 May 2026 cut-off uses
# the last INSP sitrep where every reporting zone is monotonic in the
# cumulative — the 24 May vintage revises two zones downward (Goma and
# Katwa), giving a sum below 23 May.
#
# Zone coverage grows over the trajectory: 7 zones reporting on 18 May,
# 12 zones by 23 May. So a higher cumulative at a later sitrep may
# partly reflect newly-reporting zones rather than incidence alone.
# The 18 May INSP sum (516 cases, 131 deaths) matches the WHO AFRO
# joint sitrep 01 figure exactly. The model uses suspected counts.

as_of_date = "2026-05-23"

[exported_cases]
value  = 3
source = "WHO DON 2026-DON602, 2026-DON603, and WHO Director-General Ministerial Briefing 25 May 2026 — three travel-related (DRC) cases imported into Uganda: (i) elderly man admitted Kampala 11 May 2026, died 14 May; (ii) second import confirmed 16 May 2026 in Kampala with no apparent link to the first; (iii) woman from DRC who travelled Arua to Entebbe to Kampala with mild symptoms, tested positive on follow-up, announced 23 May 2026 (https://www.aljazeera.com/news/2026/5/23/uganda-confirms-three-new-ebola-cases-bringing-total-to-five). Two additional Uganda confirmed cases announced 23 May (a driver and a healthcare worker) are domestic contacts of import #1 and are excluded — this model treats Uganda as imports only."

[exports_deaths]
value  = 1
source = "WHO DON 2026-DON602 — one death (import #1, died 14 May 2026). No deaths reported among imports #2 or #3 as of the 23 May 2026 cut-off."

[first_export_detection_date]
value  = "2026-05-11"
source = "WHO DON 2026-DON602 — import #1 hospital-admitted 11 May 2026 (point-of-entry/hospital detection date). Used as a one-sided timing bound on T. Detection dates for imports #2 (confirmed 16 May) and #3 (announced 23 May; underlying detection date not published) are not used by the model: only the earliest detection enters the timing term."

[export_death_dates]
value  = ["2026-05-14"]
source = "WHO DON 2026-DON602 — the fatal Uganda export (import #1) was hospital-admitted 11 May 2026 and died 14 May 2026 (hospital-recorded death date). A list of dated export deaths; loaded as a daily series and fitted with a binned-Poisson likelihood that bounds T."

[total_deaths]
value  = 220
source = "INRB-UMIE/Ebola_DRC_2026 transcription of INSP SitRep 010 (data as of 23 May 2026) — DRC cumulative suspected deaths, summed across the 12 reporting health zones from insp_sitrep__cumulative_suspected_deaths__daily.csv."

[reported_cases]
value  = 905
source = "INRB-UMIE/Ebola_DRC_2026 transcription of INSP SitRep 010 (data as of 23 May 2026) — DRC cumulative suspected cases, summed across the 12 reporting health zones from insp_sitrep__cumulative_suspected_cases__daily.csv."

# Cumulative reported-case totals across INSP situation-report vintages.
# We trust each vintage's cumulative-at-date count but not the per-case
# timing (heavy backfill at the zone level; the INSP `date` is the
# sitrep publication date, not symptom onset or specimen collection),
# so the model fits the between-vintage increments rather than the
# nested cumulative totals. Values are cumulative DRC suspected cases
# summed across reporting health zones at each INSP sitrep date. The
# cut-off vintage (23 May) matches `reported_cases`. The 14 and 15 May
# vintages from INSP cover only 1 and 3 zones respectively and are
# omitted here; we start the trajectory at 18 May (7 zones, matching
# the WHO joint sitrep 01 total of 516) and grow to 12 zones by 23 May.
[reported_case_history]
dates  = ["2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21",
          "2026-05-22", "2026-05-23"]
values = [516, 575, 672, 745, 872, 905]
source = "INRB-UMIE/Ebola_DRC_2026 (https://github.com/INRB-UMIE/Ebola_DRC_2026, MIT licence), transcribed from INSP SitReps 004-010 published 18-23 May 2026. Values are cumulative DRC suspected cases summed across reporting health zones at each sitrep date. The 24 May vintage is omitted because two zones (Goma, Katwa) were revised downward, giving a cumulative sum (893) below the 23 May figure."

[confirmed_cases]
value  = 101
source = "INSP SitRep 009 (23 May 2026) section IV.3 LABORATOIRE — `Cumul positifs`. The lab-section headline figure is six higher than the INRB-UMIE zone-summed transcription (95) because some confirmed samples were not yet linked to a reporting zone; we use the lab raw count to stay consistent with [cumulative_tests_analysed] below, which is also from the lab section."

[cumulative_tests_analysed]
value  = 211
source = "INSP SitRep 009 (23 May 2026) section IV.3 LABORATOIRE — `Cumul échantillons analysés`. Cumulative number of suspected-case specimens that the Bunia/INRB pipeline has completed processing by the cut-off. The 418 received minus 207 unanalysed reflects the lab-pipeline backlog and gives a natural right-truncation handle on the per-test positivity rate (101/211 ≈ 47.9%)."

[daily_outbound_travellers]
value  = 1871
source = "McCabe et al. Table 3 — mean daily PoE flow across seven Uganda-DRC border points, Ituri side"

[daily_outbound_travellers_sd]
value  = 200
source = "PoE-to-PoE variation and sitrep sampling uncertainty; ~10% CV"

[source_population]
value  = 4392200
source = "McCabe et al. Table 1 — Ituri Province population"

# Genetic TMRCA. A soft lower bound on the seeding time T, the time to
# the most recent common ancestor of the first sequenced cases. It is a
# lower bound because adding sequences only pushes the TMRCA older, and
# the sampled tree is geographically narrow (9 of 10 genomes from
# Bunia), so broader sampling could move it earlier. `date` is the
# BEAST mean TMRCA reported in the 2026-05-21 temporal-tree update.
# `days_sd` is the SD on the location of the floor (uncertainty in the
# estimate, in either direction), not a constraint on how old T can be;
# it is derived from the reported 95% HPD interval (about +/- 30 days,
# so SD ~ 15 days). `alt_date` / `alt_days_sd` carry the same estimate
# under the faster 1.9e-3 early-epidemic clock rate (mean 2026-04-11,
# 95% HPD 2026-03-23 to 2026-04-28, so SD ~ 9 days), used by the
# clock-rate sensitivity. Both dates are converted to days before
# `as_of_date` at load time, so they track changes to the cut-off.
[genetic_tmrca]
date        = "2026-03-25"
days_sd     = 15
alt_date    = "2026-04-11"
alt_days_sd = 9
source = "BEAST v10.5.0 temporal tree of the first 10 BDBV genomes (virological2026, 2026-05-21 update; HKY substitution model, strict molecular clock, exponential coalescent prior). Mean TMRCA 2026-03-25, 95% HPD 2026-02-20 to 2026-04-20, at the 1.2e-3 substitutions/site/year clock rate (holmes2016, all public 2013-2016 EBOV data) matching this analysis. The faster 1.9e-3 early-epidemic rate gives a more recent mean TMRCA of 2026-04-11 (HPD 2026-03-23 to 2026-04-28). Estimate is Bunia-specific and a lower bound, since further or geographically broader sequencing only pushes the TMRCA older. Using the genetic TMRCA as a seeding bound follows a suggestion of N. Ferguson (ferguson2026)."
