# BVD outbreak observation manifest.
#
# Cumulative totals by the cut-off date plus per-vintage histories used
# for time-series likelihoods. All dates ISO-8601; counts integers.

# Cut-off date (last day of the daily grid).
cutoff_date = 2026-05-23

# Seeding-window-aware start date (first day of the daily grid).
seeding_date = 2026-05-01

# First WHO joint situation report; intervention breakpoint for R_t.
who_first_sitrep_date = 2026-05-18

# Genetic TMRCA bound (days before cut-off) on the seeding age.
tmrca_days = 30

