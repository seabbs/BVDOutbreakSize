# Genetic TMRCA. A soft lower bound on the seeding time T, the time to
# the most recent common ancestor of the first sequenced cases. It is a
# lower bound because adding sequences only pushes the TMRCA older
# (Pybus; Judge, pers. comm.). `date` is the estimated TMRCA, taken as
# ~80 days before the reference date 2026-05-21 on which the estimate
# was reported. `days_sd` is the SD on the location of the floor
# (uncertainty in the estimate, in either direction), not a constraint
# on how old T can be.
[genetic_tmrca]
date    = "2026-03-02"
days_sd = 20
source = "Maximum-likelihood phylogeny of the first eight BDBV genomes (virological2026), genetic distance divided by the 1.2e-3 substitutions/site/year clock rate of holmes2016; combination per N. Ferguson (ferguson2026). ~80 days before the reference date 2026-05-21 on which the estimate was reported, and a lower bound, since further sequences only push the TMRCA older."
