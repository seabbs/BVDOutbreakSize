repos:
#####
# Basic file cleanliness
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-added-large-files
    -   id: check-yaml
    -   id: check-toml
    -   id: check-merge-conflict
    -   id: check-json
    -   id: debug-statements
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
    -   id: trailing-whitespace
#####
# Julia formatter — runs via the project's pinned test/formatter/
# sub-environment so the JuliaFormatter version stays in sync with CI
# and works across the Julia versions the package supports.
-   repo: local
    hooks:
    -   id: julia-formatter
        name: julia-formatter (SciML, test/formatter env)
        entry: scripts/run_formatter.sh
        language: script
        types_or: [julia]
        pass_filenames: false
#####
# Secrets
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '.*/Manifest\.toml$'
